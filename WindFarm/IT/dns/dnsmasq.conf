# ============================================================
# AE3GIS Corporate DNS — dnsmasq config
# ============================================================
# Override any of these via /etc/dnsmasq.d/dynamic.conf
# (auto-generated by entrypoint.sh from env vars)
# ============================================================

# Internal hostname resolution
address=/webserver1.corp.local/10.10.1.10
address=/webserver2.corp.local/10.10.1.11
address=/dns.corp.local/10.10.1.12
address=/ftp-ext.corp.local/10.10.1.13
address=/internal-web.corp.local/10.10.5.20
address=/internal-ftp.corp.local/10.10.5.21
address=/db.corp.local/10.10.5.22

# Forward external queries upstream
server=8.8.8.8
server=8.8.4.4

# Listen on all interfaces
listen-address=0.0.0.0
bind-interfaces

# Don't read /etc/resolv.conf (we handle forwarding above)
no-resolv

# Cache 1000 entries
cache-size=1000

# Log queries for debugging / Zeek correlation
log-queries
log-facility=/var/log/dnsmasq.log
