server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;

    server_name _;

    # Serve static pages
    location / {
        try_files $uri $uri/ =404;
    }

    # Fake API endpoints that return JSON (for realistic HTTP traffic)
    location /api/health {
        default_type application/json;
        return 200 '{"status": "ok", "uptime": "$request_time"}';
    }

    location /api/status {
        default_type application/json;
        return 200 '{"service": "web", "version": "2.1.4", "healthy": true}';
    }

    location /login {
        default_type text/html;
        return 200 '<html><body><h1>Login</h1><form><input name="user"><input name="pass" type="password"><button>Login</button></form></body></html>';
    }

    location /dashboard {
        default_type text/html;
        return 200 '<html><body><h1>Dashboard</h1><p>Welcome back, admin.</p></body></html>';
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
