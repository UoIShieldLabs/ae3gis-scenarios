# ============================================================
# AE3GIS FTP Server — vsftpd config
# ============================================================

# Run in foreground (for Docker)
background=NO

# Allow local users to log in
local_enable=YES
write_enable=YES
local_umask=022

# Chroot users to their home directory
chroot_local_user=YES
allow_writeable_chroot=YES

# Use local_root for user home
user_sub_token=$USER
local_root=/home/$USER

# Passive mode settings for Docker networking
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40010
# pasv_address will be set dynamically if needed
pasv_addr_resolve=NO

# Logging
xferlog_enable=YES
xferlog_std_format=NO
log_ftp_protocol=YES
vsftpd_log_file=/var/log/vsftpd.log

# Security
anonymous_enable=NO
seccomp_sandbox=NO

# Listen on all interfaces (IPv4)
listen=YES
listen_ipv6=NO

# PAM service
pam_service_name=vsftpd
